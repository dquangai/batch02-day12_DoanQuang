name: Day 12 Agent CI/CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Test, Coverage
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AGENT_API_KEY: dev-key-change-me
      REDIS_URL: redis://localhost:6379/0
      RATE_LIMIT_PER_MINUTE: "10"
      MONTHLY_BUDGET_USD: "10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Unit tests with coverage
        run: pytest

      - name: Production readiness checker
        run: python 06-lab-complete/check_production_ready.py

      - name: Docker compose config validation
        run: docker compose config

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t day12-agent:${{ github.sha }} .

  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.DEPLOY_TARGET == 'railway'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: railway up --service "$RAILWAY_SERVICE" --detach

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.DEPLOY_TARGET == 'render'

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
